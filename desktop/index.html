<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function() {
        var palette = localStorage.getItem('palette');
        var darkPalettes = ['default-dark', 'catppuccin-mocha', 'rose-pine'];
        if (palette) {
          document.documentElement.setAttribute('data-palette', palette);
          if (darkPalettes.indexOf(palette) !== -1) document.documentElement.classList.add('dark');
        } else if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.documentElement.setAttribute('data-palette', 'default-dark');
        } else {
          document.documentElement.setAttribute('data-palette', 'default-light');
        }
        if (localStorage.getItem('glass') === 'true') document.documentElement.setAttribute('data-glass', 'true');
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/dorabot.png" />
    <title>dorabot</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
